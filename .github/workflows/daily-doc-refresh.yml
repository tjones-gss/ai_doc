name: Daily doc refresh

# Each weekday morning:
#   * Surfaces AI-tooling + internal-tools deltas in a GitHub issue.
#   * For each brand-new internal-tools repo, generates a starter catalog
#     article from its README + metadata (read via GH_PAT — no LLM/API key,
#     and independent of whether Cursor can see the org).
#   * Commits new articles + data/known-versions.json STRAIGHT TO MAIN.
#
# See scripts/check-updates.sh for the logic.

on:
  schedule:
    - cron: "0 12 * * 1-5"   # Mon–Fri 12:00 UTC ~ 7am US Central
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print findings, don't write/commit"
        required: false
        default: "0"
      skip_draft:
        description: "Skip generating starter articles (still posts issue + state)"
        required: false
        default: "0"

permissions:
  contents: write   # commit articles + state straight to main
  issues: write     # open / append the daily issue

concurrency:
  group: daily-doc-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use GH_PAT so the push to main can trigger the Pages deploy.
          # (A push made with the default GITHUB_TOKEN will NOT trigger other
          # workflows.) Falls back to GITHUB_TOKEN if GH_PAT is unset.
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Ensure required CLIs are present
        run: |
          gh --version
          jq --version
          curl --version

      - name: Run check-updates.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          DRY_RUN: ${{ github.event.inputs.dry_run || '0' }}
          SKIP_DRAFT: ${{ github.event.inputs.skip_draft || '0' }}
        run: |
          chmod +x scripts/check-updates.sh
          scripts/check-updates.sh
